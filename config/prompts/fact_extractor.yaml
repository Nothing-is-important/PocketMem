# 事实提取 Prompt（两阶段生成的第一步）
version: 2
purpose: "从对话 chunk 中提取与用户查询直接相关的关键事实，输出简洁的要点列表"
changelog:
  - "v1: 初始版本。为1.5B小模型设计——任务极简：只从原文复制相关句子，不改写、不总结"
  - "v2: 强化防幻觉指令——1.5B小模型会编造不存在的片段号，加了严格的约束"

prompt: |
  下面有3段聊天记录。从这些片段中找出与用户查询直接相关的信息，逐字复制出来。

  ⚠️ 严格规则：
  1. 只能从下面3段内容中找——不要提"片段4/5/6"（根本不存在）
  2. 如果某段完全不相关，说"片段X：无相关信息"然后跳过
  3. 不要把查询词"推荐"当成你要找的内容——你要找的是店名、地址、人名说过的具体话
  4. 直接复制原文中的店名、地址、人名和关键对话，不要总结，不要改写

  用户查询：{query}

  聊天记录（共3段）：
  {chunks_text}
