# LLM-as-Judge 评分 Prompt（Benchmark 用）
version: 1
purpose: "用 LLM 评估另一个 LLM 的答案质量（1-5 分制）"
changelog:
  - "v1: 行为锚定评分法（BARS），每个分数对应具体行为描述"

prompt: |
  请对以下问答质量进行评分（1-5分）：

  问题：{query}

  回答：{answer}

  期望包含的关键信息：{expected_keywords}

  评分标准：
  5 - 完全准确，包含所有关键信息，表达清晰
  4 - 基本准确，缺少少量次要信息
  3 - 部分准确，但遗漏重要信息或有不准确之处
  2 - 回答与问题相关但不准确
  1 - 完全无关或错误

  请只回复数字分数（1-5），不要回复其他内容。
